<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Suomi-Leasing – Jarkko Meretniemi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f5f0e8;
      --ink: #1a1713;
      --muted: #7a7060;
      --accent: #c8401a;
      --rule: #d4cbbf;
      --serif: 'Libre Baskerville', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }
    html { font-size: 18px; scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--ink); font-family: var(--sans); font-weight: 300; line-height: 1.7; -webkit-font-smoothing: antialiased; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; border-bottom: 1px solid var(--rule); }
    .logo { font-family: var(--serif); font-size: 1rem; font-style: italic; color: var(--ink); text-decoration: none; }
    nav a.back { font-size: 0.82rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    nav a.back:hover { color: var(--accent); }
    .case-hero { max-width: 680px; margin: 0 auto; padding: 6rem 2rem 4rem; }
    .case-label { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.2rem; }
    .case-hero h1 { font-family: var(--serif); font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 700; line-height: 1.25; letter-spacing: -0.01em; }
    .rule { border: none; border-top: 1px solid var(--rule); max-width: 680px; margin: 0 auto; }
    section { max-width: 680px; margin: 0 auto; padding: 4rem 2rem; }
    .block-label { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
    .block p { color: var(--muted); margin-bottom: 0.75rem; font-size: 0.97rem; }
    .block p:last-child { margin-bottom: 0; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5px; }
    .stat-box { background: white; padding: 2rem; }
    .stat-num { font-family: var(--serif); font-size: 2.2rem; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 0.5rem; }
    .stat-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
    .cta-bar { background: var(--ink); color: var(--cream); text-align: center; padding: 4rem 2rem; }
    .cta-bar p { font-size: 0.95rem; color: #b0a898; margin-bottom: 1.5rem; }
    .btn { display: inline-block; background: var(--cream); color: var(--ink); font-family: var(--sans); font-size: 0.82rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; padding: 0.9rem 2.2rem; transition: background 0.2s; }
    .btn:hover { background: var(--accent); color: white; }
    footer { border-top: 1px solid var(--rule); max-width: 680px; margin: 0 auto; padding: 3rem 2rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; flex-wrap: wrap; }
    .footer-bio .name { font-family: var(--serif); font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .footer-bio p { font-size: 0.88rem; color: var(--muted); max-width: 340px; line-height: 1.6; }
    .footer-links { display: flex; flex-direction: column; gap: 0.4rem; text-align: right; }
    .footer-links a { font-size: 0.88rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
